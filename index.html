<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="kanbanboard">Kanban Board</div>
            <button id="newtask">+ Add Task</button>
        </nav>
        <div class="taskboard">
            <div class="taskcolum">
                <div class="heading">
                    <div class="left">To Do</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div class="taskcolum">
                <div class="heading">
                    <div class="left">In Process</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div class="taskcolum">
                <div class="heading">
                    <div class="left">Completed</div>
                    <div class="right">Count</div>
                </div>
            </div>
        </div>
        <div id="modalelement">
            <div class="modal">
                <div class="addtaskboc">
                    <input type="text" class="name" id="name" placeholder="Add Task Name...">
                    <input type="text" class="name" id="details" placeholder="Description">
                    <div class="addCancelbtn">
                        <button type="button" id="cancel">Cancel</button>
                        <button type="submit" id="addbtn">Add</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
